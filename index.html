<section id="contato">

  <div class="container contact-grid">

    <div class="contact-info reveal">

      <span class="section-tag">Contato</span>
      <h2>Agende seu horário</h2>

      <p>
        Entre em contato e agende seu atendimento premium.
      </p>

      <a href="https://wa.me/5511999999999" class="btn-primary" target="_blank">
        WhatsApp
      </a>

    </div>

    <form class="contact-form reveal" id="formAgendamento">

      <input type="text" id="nome" placeholder="Seu nome" required>

      <input type="tel" id="telefone" placeholder="Seu telefone" required>

      <select id="servico" required>
        <option value="">Escolha um serviço</option>
        <option>Corte Masculino</option>
        <option>Barba Premium</option>
        <option>Pigmentação</option>
        <option>Combo Premium</option>
      </select>

      <div class="form-row">
        <input type="date" id="data" required>
        <input type="time" id="hora" required>
      </div>

      <button type="submit" class="btn-primary">
        Confirmar Agendamento
      </button>

    </form>

  </div>

</section>
