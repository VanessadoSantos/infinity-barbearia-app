<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento - Barbearia Infinity</title>
  <meta name="description" content="Agende seu horário na Barbearia Infinity - cortes modernos, barba e experiência premium.">
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Botão WhatsApp Flutuante -->
<a href="https://wa.me/55119964995899" class="whatsapp" aria-label="Falar no WhatsApp">💬</a>

<header>
  <h1>Agendamento</h1>
  <nav>
    <a href="index.html">Voltar</a>
  </nav>
</header>

<section class="form-section">
  <h2>Agende seu horário</h2>

  <form id="formAgendamento" onsubmit="agendar(event)">
    
    <!-- DADOS -->
    <label for="nome">Nome</label>
    <input type="text" id="nome" placeholder="Seu nome completo" required>

    <label for="endereco">Endereço</label>
    <input type="text" id="endereco" placeholder="Rua, número, bairro" required>

    <label for="cep">CEP</label>
    <input type="text" id="cep" placeholder="00000-000" pattern="[0-9]{5}-[0-9]{3}" required>

    <label for="cpf">CPF</label>
    <input type="text" id="cpf" placeholder="000.000.000-00" pattern="[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}" required>

    <label for="whatsapp">WhatsApp</label>
    <input type="tel" id="whatsapp" placeholder="(11) 99999-9999" required>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="seuemail@exemplo.com" required>

    <!-- SERVIÇOS -->
    <h3>Escolha os serviços</h3>
    <label><input type="checkbox" value="Corte"> Corte</label>
    <label><input type="checkbox" value="Barba"> Barba</label>
    <label><input type="checkbox" value="Corte + Barba"> Corte + Barba</label>
    <label><input type="checkbox" value="Sobrancelha"> Sobrancelha</label>

    <!-- DATA -->
    <label for="data">Data</label>
    <input type="date" id="data" required>

    <label for="hora">Hora</label>
    <input type="time" id="hora" required>

    <button type="submit">Confirmar Agendamento</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
