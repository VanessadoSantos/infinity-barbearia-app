<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- META -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        http-equiv="X-UA-Compatible"
        content="IE=edge"
    >

    <!-- SEO -->

    <title>
        Infinity Barbearia | Login Admin
    </title>

    <meta
        name="description"
        content="Painel administrativo Infinity Barbearia."
    >

    <!-- FONTS -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- FONT AWESOME -->

    <script
        src="https://kit.fontawesome.com/7a4b62b0a4.js"
        crossorigin="anonymous"
    ></script>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="./style/admin.css"
    >

</head>

<body>

    <!-- BACKGROUND -->

    <div class="login-background"></div>

    <!-- LOGIN -->

    <main class="login-container">

        <form
            class="login-form"
            id="loginForm"
        >

            <!-- LOGO -->

            <div class="login-logo">

                <h1>

                    Infinity
                    <span>Barbearia</span>

                </h1>

                <p>
                    Painel Administrativo
                </p>

            </div>

            <!-- EMAIL -->

            <div class="input-group">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Seu email"
                    required
                >

            </div>

            <!-- PASSWORD -->

            <div class="input-group">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Sua senha"
                    required
                >

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                id="loginButton"
            >

                Entrar

            </button>

            <!-- MESSAGE -->

            <div
                class="login-message"
                id="loginMessage"
            ></div>

        </form>

    </main>

    <!-- SCRIPT -->

    <script>

        const form =
        document.getElementById(
            'loginForm'
        );

        const button =
        document.getElementById(
            'loginButton'
        );

        const message =
        document.getElementById(
            'loginMessage'
        );

        form.addEventListener(

            'submit',

            async (e) => {

                e.preventDefault();

                const email =
                document.getElementById(
                    'email'
                ).value.trim();

                const password =
                document.getElementById(
                    'password'
                ).value.trim();

                // BUTTON LOADING

                button.disabled = true;

                button.innerText =
                'Entrando...';

                message.innerText = '';

                try{

                    const response =
                    await fetch(

                        'http://localhost:3000/api/auth/login',

                        {

                            method:'POST',

                            headers:{

                                'Content-Type':
                                'application/json'

                            },

                            body:JSON.stringify({

                                email,

                                password

                            })

                        }

                    );

                    const data =
                    await response.json();

                    // SUCCESS

                    if(data.success){

                        localStorage.setItem(

                            'token',

                            data.token

                        );

                        localStorage.setItem(

                            'user',

                            JSON.stringify(
                                data.user
                            )

                        );

                        message.innerText =
                        'Login realizado.';

                        message.classList.add(
                            'success'
                        );

                        setTimeout(() => {

                            window.location.href =
                            './index.html';

                        }, 1000);

                    } else {

                        message.innerText =

                        data.message ||
                        'Login inválido.';

                        message.classList.add(
                            'error'
                        );

                    }

                } catch(error){

                    message.innerText =

                    'Erro ao conectar servidor.';

                    message.classList.add(
                        'error'
                    );

                } finally {

                    button.disabled = false;

                    button.innerText =
                    'Entrar';

                }

            }

        );

    </script>

</body>

</html>
