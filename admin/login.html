<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Login Admin
</title>

<link
rel="stylesheet"
href="./style/admin.css"
>

</head>

<body>

<div class="login-container">

    <form
        class="login-form"
        id="loginForm"
    >

        <h1>
            Login Admin
        </h1>

        <input
            type="email"
            id="email"
            placeholder="Seu email"
        >

        <input
            type="password"
            id="password"
            placeholder="Sua senha"
        >

        <button type="submit">

            Entrar

        </button>

    </form>

</div>

<script>

const form =
document.getElementById('loginForm');

form.addEventListener('submit',
async (e) => {

    e.preventDefault();

    const email =
    document.getElementById('email').value;

    const password =
    document.getElementById('password').value;

    const response =
    await fetch(
        'http://localhost:3000/api/auth/login',
        {

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({
                email,
                password
            })

        }
    );

    const data =
    await response.json();

    if(data.token){

        localStorage.setItem(
            'token',
            data.token
        );

        window.location.href =
        './index.html';

    } else {

        alert('Login inválido');

    }

});

</script>

</body>
</html>
